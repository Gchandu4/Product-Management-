services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: carevale-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: carevale-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ALLOWED_ORIGINS
        value: https://carevale-frontend.onrender.com
    autoDeploy: true

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: carevale-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://carevale-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true

databases:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  - name: carevale-db
    databaseName: carevale_db
    user: carevale_admin
    plan: free
